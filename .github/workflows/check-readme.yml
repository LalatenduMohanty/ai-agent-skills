name: Check README skills tables

on:
  pull_request:
    paths:
      - "claude-code/skills/**"
      - "cursor/skills/**"
      - "general/skills/**"
      - "README.md"
      - "scripts/update-readme-skills.sh"
  push:
    branches: [main]
    paths:
      - "claude-code/skills/**"
      - "cursor/skills/**"
      - "general/skills/**"
      - "README.md"
      - "scripts/update-readme-skills.sh"

jobs:
  check-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Verify README skills tables are up to date
        run: ./scripts/update-readme-skills.sh --check
